# ~/.tmux.conf — power-user setup
# See setup.md in this repo for installation instructions.

# Better prefix (Ctrl+a is easier to reach than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Mouse support
set -g mouse on

# Start windows/panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Faster escape time (better for vim/neovim)
set -sg escape-time 10

# 256 color + true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Split panes with intuitive keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows/panes open in current path
bind c new-window -c "#{pane_current_path}"

# Easier pane navigation (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with prefix + HJKL
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Increase scrollback
set -g history-limit 50000

# Status bar — minimal, p10k-friendly
set -g status-style "bg=default"
set -g status-left ""
set -g status-right "#[fg=cyan]%H:%M #[fg=white]| #[fg=green]#S"
set -g status-justify centre

# --- TPM plugins (optional) ---
# Install TPM first: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then press prefix + I to install plugins below.
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save every 15 min
set -g @plugin 'tmux-plugins/tpm'

run '~/.tmux/plugins/tpm/tpm'
